<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin — Alex Media</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* Brand tokens mirrored from the site's styles.css */
    :root {
      --bg:        oklch(0.985 0.008 240);
      --surface:   oklch(1 0 0);
      --ink:       oklch(0.26 0.04 258);
      --muted:     oklch(0.52 0.025 258);
      --line:      oklch(0.92 0.012 250);
      --line-soft: oklch(0.95 0.01 250);
      --blue:      oklch(0.6 0.19 252);
      --blue-deep: oklch(0.46 0.16 258);
      --blue-soft: oklch(0.95 0.04 252);
      --coral:     oklch(0.72 0.16 25);
      --yellow:    oklch(0.87 0.14 92);
      --violet:    oklch(0.64 0.18 300);
      --lime:      oklch(0.55 0.14 150);
      --lime-soft: oklch(0.95 0.05 150);
      --coral-soft: oklch(0.95 0.04 25);
      --yellow-soft: oklch(0.96 0.06 92);
      --amber-ink: oklch(0.55 0.13 75);
      --shadow-sm: 0 2px 8px oklch(0.6 0.1 255 / 0.08);
      --shadow-md: 0 14px 34px oklch(0.55 0.12 258 / 0.12);
      --r-sm: 12px; --r-md: 18px;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --font-display: 'Space Grotesk', system-ui, sans-serif;
      --font-body: 'Plus Jakarta Sans', system-ui, sans-serif;
      --head-h: 70px;
    }
    * { box-sizing: border-box; }
    body { font-family: var(--font-body); margin: 0; color: var(--ink); background: var(--bg); -webkit-font-smoothing: antialiased; line-height: 1.55; }
    h1, h2, h3, h4 { font-family: var(--font-display); font-weight: 600; letter-spacing: -0.02em; margin: 0; }

    /* ---------- header ---------- */
    header { height: var(--head-h); background: var(--surface); border-bottom: 1px solid var(--line); padding: 0 24px; position: sticky; top: 0; z-index: 20; display: flex; gap: 16px; align-items: center; box-shadow: var(--shadow-sm); }
    .brand { display: flex; align-items: center; gap: 11px; flex: 1; min-width: 0; }
    .logo-mark { width: 34px; height: 34px; border-radius: 10px; background: var(--blue); color: #fff; display: grid; place-items: center; font-family: var(--font-display); font-weight: 700; font-size: 18px; box-shadow: 0 6px 16px oklch(0.6 0.19 252 / 0.35); flex-shrink: 0; }
    header h1 { font-size: 17px; }
    header h1 small { display: block; font-family: var(--font-body); font-weight: 500; font-size: 12px; color: var(--muted); letter-spacing: 0; }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .header-actions input { padding: 9px 14px; border: 1px solid var(--line); border-radius: 999px; width: 200px; background: var(--bg); font: inherit; }
    .header-actions input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-soft); }
    .view-live { font-family: var(--font-display); font-weight: 600; font-size: 13.5px; color: var(--blue-deep); padding: 9px 12px; border-radius: 999px; text-decoration: none; }
    .view-live:hover { background: var(--blue-soft); }

    /* ---------- app shell ---------- */
    .app { display: flex; align-items: flex-start; max-width: 1200px; margin: 0 auto; }
    .sidebar { width: 250px; flex-shrink: 0; position: sticky; top: var(--head-h); height: calc(100vh - var(--head-h)); border-right: 1px solid var(--line); padding: 22px 14px; display: flex; flex-direction: column; overflow: auto; background: var(--surface); }
    .nav { flex: 1; }
    .nav-group { margin-bottom: 18px; }
    .nav-group-label { font-family: var(--font-display); font-size: 11px; text-transform: uppercase; letter-spacing: .09em; color: var(--muted); padding: 0 12px 8px; }
    .nav-item { display: flex; align-items: center; gap: 8px; width: 100%; text-align: left; padding: 9px 12px; border: none; background: none; border-radius: 11px; cursor: pointer; font-family: var(--font-body); font-size: 14px; color: var(--ink); transition: background 0.15s; }
    .nav-item:hover { background: var(--bg); }
    .nav-item.active { background: var(--blue-soft); color: var(--blue-deep); font-weight: 600; }
    .nav-item .nav-name { flex: 1; }
    .nav-item .count { font-size: 12px; color: var(--muted); background: var(--bg); border-radius: 999px; padding: 1px 9px; }
    .nav-item.active .count { background: var(--surface); color: var(--blue-deep); }
    .nav-item .count.pending { background: oklch(0.92 0.09 80); color: var(--amber-ink); font-weight: 700; }
    .sidebar-foot { border-top: 1px solid var(--line); padding-top: 16px; margin-top: 10px; }
    .sidebar-foot .btn { width: 100%; justify-content: center; }
    #out { font-size: 13px; margin-top: 11px; white-space: pre-wrap; min-height: 18px; }

    .content { flex: 1; padding: 30px 34px 80px; min-width: 0; }

    /* ---------- section head ---------- */
    .section-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; margin-bottom: 20px; }
    .section-head h2 { font-size: 24px; }
    .section-head p { color: var(--muted); font-size: 14px; margin-top: 5px; max-width: 62ch; }

    /* ---------- collapsible item cards ---------- */
    .item { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-md); margin-bottom: 12px; box-shadow: var(--shadow-sm); overflow: hidden; }
    .item.open { box-shadow: var(--shadow-md); border-color: oklch(0.86 0.03 250); }
    .item-summary { display: flex; align-items: center; gap: 12px; padding: 15px 18px; cursor: pointer; user-select: none; }
    .item-num { width: 24px; height: 24px; flex-shrink: 0; border-radius: 7px; background: var(--bg); color: var(--muted); font-family: var(--font-display); font-weight: 600; font-size: 12px; display: grid; place-items: center; }
    .dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .item-title { flex: 1; font-family: var(--font-display); font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-title .empty { color: var(--muted); font-weight: 400; font-style: italic; }
    .item-controls { display: flex; align-items: center; gap: 4px; }
    .iconbtn { width: 30px; height: 30px; border-radius: 8px; border: 1px solid transparent; background: none; color: var(--muted); display: grid; place-items: center; font-size: 15px; cursor: pointer; transition: background 0.15s, color 0.15s, border-color 0.15s; }
    .iconbtn:hover { background: var(--bg); color: var(--ink); }
    .iconbtn:disabled { opacity: 0.3; cursor: default; }
    .iconbtn.danger:hover { background: var(--coral-soft); color: var(--coral); border-color: var(--coral-soft); }
    .chev { color: var(--muted); transition: transform 0.25s var(--ease); margin-left: 2px; }
    .item.open .chev { transform: rotate(180deg); }
    .item-body { display: none; padding: 4px 18px 20px; }
    .item.open .item-body { display: block; }

    /* ---------- fields ---------- */
    label { display: block; font-size: 13px; font-weight: 600; margin: 14px 0 5px; }
    input, textarea, select { width: 100%; padding: 10px 13px; border: 1px solid var(--line); border-radius: var(--r-sm); font: inherit; color: var(--ink); background: var(--bg); transition: border-color 0.2s, box-shadow 0.2s, background 0.2s; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-soft); background: var(--surface); }
    textarea { resize: vertical; min-height: 64px; }
    .field-hint { font-size: 12px; color: var(--muted); font-weight: 400; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .checkbox-field { display: flex; align-items: center; gap: 8px; margin-top: 14px; }
    .checkbox-field input { width: auto; }

    /* ---------- buttons ---------- */
    button { font: inherit; cursor: pointer; }
    .btn { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-display); font-weight: 600; font-size: 14px; padding: 11px 20px; border-radius: 999px; border: 1.5px solid var(--line); background: var(--surface); color: var(--ink); transition: transform 0.2s var(--ease), box-shadow 0.2s var(--ease), background 0.2s, border-color 0.2s, color 0.2s; }
    .btn:hover { border-color: var(--blue); color: var(--blue-deep); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
    .btn:active { transform: translateY(1px) scale(0.99); }
    .btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); box-shadow: 0 8px 20px oklch(0.6 0.19 252 / 0.32); }
    .btn-primary:hover { background: var(--blue-deep); color: #fff; box-shadow: 0 12px 26px oklch(0.6 0.19 252 / 0.4); }
    .btn-sm { padding: 8px 16px; font-size: 13px; }
    .btn-add { border-style: dashed; width: 100%; padding: 14px; color: var(--muted); justify-content: center; margin-top: 4px; }
    .btn-add:hover { color: var(--blue-deep); }

    /* ---------- reviews ---------- */
    .item.pending { border-color: oklch(0.85 0.1 80); }
    .review-card { padding: 18px 20px; }
    .review-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .badge { font-family: var(--font-display); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; padding: 4px 10px; border-radius: 999px; }
    .badge.pending { background: oklch(0.92 0.09 80); color: var(--amber-ink); }
    .badge.live { background: var(--lime-soft); color: var(--lime); }
    .stars-sm { color: var(--yellow); letter-spacing: 2px; margin-left: auto; }
    .review-text { margin: 10px 0; font-size: 15px; }
    .review-actions { display: flex; gap: 8px; margin-top: 14px; }
    .btn-approve { display: inline-flex; align-items: center; font-family: var(--font-display); font-weight: 600; background: var(--lime); color: #fff; border: 1.5px solid var(--lime); padding: 8px 16px; font-size: 13px; border-radius: 999px; transition: transform 0.2s var(--ease), box-shadow 0.2s; }
    .btn-approve:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
    .btn-danger { display: inline-flex; align-items: center; font-family: var(--font-display); font-weight: 600; color: var(--coral); border: 1.5px solid var(--coral-soft); background: var(--surface); padding: 8px 16px; font-size: 13px; border-radius: 999px; }
    .btn-danger:hover { border-color: var(--coral); }
    .add-review { background: var(--surface); border: 1px dashed var(--line); border-radius: var(--r-md); padding: 22px; margin-top: 16px; }
    .add-review > strong { font-family: var(--font-display); font-size: 15px; }

    .empty-state { color: var(--muted); font-size: 14px; padding: 22px; text-align: center; border: 1px dashed var(--line); border-radius: var(--r-md); }
    .small { font-size: 13.5px; color: var(--muted); }

    @media (max-width: 820px) {
      .app { flex-direction: column; }
      .sidebar { width: 100%; position: static; height: auto; border-right: none; border-bottom: 1px solid var(--line); }
      .nav { display: flex; flex-wrap: wrap; gap: 6px; }
      .nav-group { margin-bottom: 0; }
      .nav-group-label { width: 100%; }
      .content { padding: 24px 18px 60px; }
      .header-actions input { width: 130px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <span class="logo-mark">A</span>
      <h1>AlexMedia <small>Content admin</small></h1>
    </div>
    <div class="header-actions">
      <a class="view-live" href="/" target="_blank" rel="noopener">View site ↗</a>
      <input id="adminSecret" type="password" placeholder="Paste ADMIN_SECRET" />
      <button class="btn btn-sm" id="refreshBtn">Reload</button>
    </div>
  </header>

  <div class="app">
    <aside class="sidebar">
      <nav class="nav" id="nav"></nav>
      <div class="sidebar-foot">
        <button class="btn btn-primary" id="saveBtn">Save changes</button>
        <p id="out" class="small">Loading…</p>
      </div>
    </aside>
    <main class="content" id="content"></main>
  </div>

  <script src="admin.js"></script>
</body>
</html>
