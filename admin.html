<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin — Alex Media</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* Brand tokens mirrored from the site's styles.css */
    :root {
      --bg:        oklch(0.985 0.008 240);
      --surface:   oklch(1 0 0);
      --ink:       oklch(0.26 0.04 258);
      --muted:     oklch(0.52 0.025 258);
      --line:      oklch(0.92 0.012 250);
      --line-soft: oklch(0.95 0.01 250);
      --blue:      oklch(0.6 0.19 252);
      --blue-deep: oklch(0.46 0.16 258);
      --blue-soft: oklch(0.95 0.04 252);
      --coral:     oklch(0.72 0.16 25);
      --yellow:    oklch(0.87 0.14 92);
      --lime:      oklch(0.55 0.14 150);
      --lime-soft: oklch(0.95 0.05 150);
      --coral-soft: oklch(0.95 0.04 25);
      --yellow-soft: oklch(0.96 0.06 92);
      --amber-ink: oklch(0.55 0.13 75);
      --shadow-sm: 0 2px 8px oklch(0.6 0.1 255 / 0.08);
      --shadow-md: 0 14px 34px oklch(0.55 0.12 258 / 0.12);
      --r-sm: 12px; --r-md: 18px;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --font-display: 'Space Grotesk', system-ui, sans-serif;
      --font-body: 'Plus Jakarta Sans', system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body { font-family: var(--font-body); margin: 0; color: var(--ink); background: var(--bg); -webkit-font-smoothing: antialiased; line-height: 1.6; }
    h1, h2, h3, h4 { font-family: var(--font-display); font-weight: 600; letter-spacing: -0.02em; margin: 0; }

    header { background: var(--surface); border-bottom: 1px solid var(--line); padding: 16px 28px; position: sticky; top: 0; z-index: 10; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; box-shadow: var(--shadow-sm); }
    .brand { display: flex; align-items: center; gap: 11px; flex: 1; }
    .logo-mark { width: 34px; height: 34px; border-radius: 10px; background: var(--blue); color: #fff; display: grid; place-items: center; font-family: var(--font-display); font-weight: 700; font-size: 18px; box-shadow: 0 6px 16px oklch(0.6 0.19 252 / 0.35); }
    header h1 { font-size: 18px; }
    header h1 small { display: block; font-family: var(--font-body); font-weight: 500; font-size: 12px; color: var(--muted); letter-spacing: 0; }

    .wrap { max-width: 980px; margin: 0 auto; padding: 28px; }
    .secret-row { display: flex; gap: 8px; align-items: center; }
    .secret-row input { padding: 10px 14px; border: 1px solid var(--line); border-radius: 999px; width: 230px; background: var(--bg); }

    .tabs { display: flex; gap: 8px; margin: 22px 0 26px; flex-wrap: wrap; }
    .tab { padding: 9px 16px; border: 1px solid var(--line); background: var(--surface); border-radius: 999px; cursor: pointer; font-family: var(--font-display); font-weight: 500; font-size: 13.5px; color: var(--ink); transition: all 0.2s var(--ease); }
    .tab:hover { border-color: var(--blue); color: var(--blue-deep); }
    .tab.active { background: var(--blue); color: #fff; border-color: var(--blue); box-shadow: 0 8px 18px oklch(0.6 0.19 252 / 0.3); }
    .panel { display: none; }
    .panel.active { display: block; }

    .item { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-md); padding: 22px; margin-bottom: 16px; box-shadow: var(--shadow-sm); }
    .item-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .item-head strong { font-family: var(--font-display); font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }

    label { display: block; font-size: 13px; font-weight: 600; margin: 14px 0 5px; }
    input, textarea, select { width: 100%; padding: 10px 13px; border: 1px solid var(--line); border-radius: var(--r-sm); font: inherit; color: var(--ink); background: var(--bg); transition: border-color 0.2s, box-shadow 0.2s; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-soft); background: var(--surface); }
    textarea { resize: vertical; min-height: 64px; }
    .field-hint { font-size: 12px; color: var(--muted); font-weight: 400; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .checkbox-field { display: flex; align-items: center; gap: 8px; margin-top: 14px; }
    .checkbox-field input { width: auto; }

    button { font: inherit; cursor: pointer; }
    .btn { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-display); font-weight: 600; font-size: 14px; padding: 11px 20px; border-radius: 999px; border: 1.5px solid var(--line); background: var(--surface); color: var(--ink); transition: transform 0.2s var(--ease), box-shadow 0.2s var(--ease), background 0.2s, border-color 0.2s; }
    .btn:hover { border-color: var(--blue); color: var(--blue-deep); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
    .btn:active { transform: translateY(1px) scale(0.99); }
    .btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); box-shadow: 0 8px 20px oklch(0.6 0.19 252 / 0.32); }
    .btn-primary:hover { background: var(--blue-deep); color: #fff; box-shadow: 0 12px 26px oklch(0.6 0.19 252 / 0.4); }
    .btn-danger { color: var(--coral); border-color: var(--coral-soft); background: var(--surface); padding: 7px 14px; font-size: 13px; }
    .btn-danger:hover { border-color: var(--coral); color: var(--coral); }
    .btn-add { border-style: dashed; width: 100%; padding: 14px; color: var(--muted); justify-content: center; }
    .btn-add:hover { color: var(--blue-deep); }

    .toolbar { position: sticky; bottom: 0; background: oklch(1 0 0 / 0.92); backdrop-filter: blur(8px); border-top: 1px solid var(--line); padding: 16px 28px; display: flex; gap: 14px; align-items: center; }
    #out { font-size: 13px; flex: 1; white-space: pre-wrap; }
    .small { font-size: 13.5px; color: var(--muted); }

    .item.pending { border-color: oklch(0.85 0.1 80); background: var(--yellow-soft); }
    .badge { font-family: var(--font-display); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; padding: 4px 10px; border-radius: 999px; }
    .badge.pending { background: oklch(0.92 0.09 80); color: var(--amber-ink); }
    .badge.live { background: var(--lime-soft); color: var(--lime); }
    .review-actions { display: flex; gap: 8px; margin-top: 14px; }
    .btn-approve { display: inline-flex; align-items: center; font-family: var(--font-display); font-weight: 600; background: var(--lime); color: #fff; border: 1.5px solid var(--lime); padding: 7px 16px; font-size: 13px; border-radius: 999px; transition: transform 0.2s var(--ease), box-shadow 0.2s; }
    .btn-approve:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
    .btn-sm { padding: 7px 16px; font-size: 13px; }
    .review-text { margin: 10px 0; font-size: 15px; }
    .stars-sm { color: var(--yellow); letter-spacing: 2px; }
    .add-review { background: var(--surface); border: 1px dashed var(--line); border-radius: var(--r-md); padding: 22px; margin-top: 10px; }
    .add-review > strong { font-family: var(--font-display); }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <span class="logo-mark">A</span>
      <h1>AlexMedia <small>Content admin</small></h1>
    </div>
    <div class="secret-row">
      <input id="adminSecret" type="password" placeholder="Paste ADMIN_SECRET" />
      <button class="btn" id="refreshBtn">Reload</button>
    </div>
  </header>

  <div class="wrap">
    <p class="small">Edits here are saved to the database and appear on the live site immediately. Services, Work &amp; Pricing changes save when you click <strong>Save changes</strong>. Review approvals and deletions save instantly.</p>

    <div class="tabs" id="tabs"></div>

    <div id="panels"></div>
  </div>

  <div class="toolbar">
    <button class="btn btn-primary" id="saveBtn">Save changes</button>
    <span id="out" class="small">Loading…</span>
  </div>

  <script src="admin.js"></script>
</body>
</html>
